<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — KCMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0a1628; --navy-mid: #112240;
    --gold: #c9a84c; --gold-light: #e8c97a;
    --cream: #f5f0e8; --gray: #8892a4;
    --border: rgba(201,168,76,0.2);
    --red: #e05c5c; --green: #5cce8a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--cream);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .bg-pattern {
    position: fixed; inset: 0; pointer-events: none;
    background-image: linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-glow {
    position: fixed; top: -30%; left: -20%;
    width: 70vw; height: 70vw;
    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .login-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 440px;
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3rem;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }
  .login-logo {
    text-align: center; margin-bottom: 2.5rem;
  }
  .login-logo .emblem {
    width: 64px; height: 64px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05));
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900;
    color: var(--gold); margin: 0 auto 1rem;
  }
  .login-logo h1 {
    font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900;
    color: var(--cream);
  }
  .login-logo p { font-size: 0.82rem; color: var(--gray); margin-top: 0.3rem; }

  .login-badge {
    display: flex; align-items: center; gap: 0.5rem;
    background: rgba(201,168,76,0.08); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.7rem 1rem;
    margin-bottom: 2rem; font-size: 0.82rem; color: var(--gray);
  }
  .login-badge .icon { font-size: 1rem; }

  .form-group { margin-bottom: 1.5rem; }
  .form-group label {
    display: block; font-size: 0.75rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray);
    margin-bottom: 0.5rem;
  }
  .form-group input {
    width: 100%;
    background: var(--navy); border: 1px solid var(--border);
    color: var(--cream); padding: 0.8rem 1rem;
    border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    transition: border-color 0.2s;
  }
  .form-group input:focus { outline: none; border-color: var(--gold); }
  .form-group input::placeholder { color: #4a5568; }

  .btn-login {
    width: 100%;
    background: var(--gold); color: var(--navy);
    border: none; padding: 0.95rem;
    border-radius: 6px; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.05em;
  }
  .btn-login:hover:not(:disabled) { background: var(--gold-light); transform: translateY(-1px); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  .error-msg {
    display: none;
    background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.3);
    border-radius: 6px; padding: 0.8rem 1rem;
    color: #f08080; font-size: 0.85rem;
    margin-bottom: 1.2rem; text-align: center;
  }
  .success-msg {
    display: none;
    background: rgba(92,206,138,0.1); border: 1px solid rgba(92,206,138,0.3);
    border-radius: 6px; padding: 0.8rem 1rem;
    color: #7debb8; font-size: 0.85rem;
    margin-bottom: 1.2rem; text-align: center;
  }

  .login-footer { text-align: center; margin-top: 2rem; }
  .login-footer a { color: var(--gold); text-decoration: none; font-size: 0.85rem; }
  .login-footer a:hover { text-decoration: underline; }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(10,22,40,0.3); border-top-color: var(--navy);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-glow"></div>

<div class="login-card">
  <div class="login-logo">
    <div class="emblem">K</div>
    <h1>KCMS Admin Portal</h1>
    <p>Karnataka College of Management & Science</p>
  </div>

  <div class="login-badge">
    <span class="icon">🔒</span>
    <span>Restricted access — authorized administrators only.</span>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="emailInput" placeholder="admin@kcms.edu" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In to Admin</button>

  <div class="login-footer">
    <a href="index.html">← Back to College Site</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://uotxrxixyyqgzyjnasgx.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_fDdMxOswlp94txp5TssRlA_Oas-_d2H';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Auto-redirect if already logged in
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = 'admin.html';
})();

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

async function handleLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('errorMsg');
  const okEl = document.getElementById('successMsg');

  errEl.style.display = 'none';
  okEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in…';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = error.message || 'Invalid credentials. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In to Admin';
  } else {
    okEl.textContent = '✓ Login successful! Redirecting…';
    okEl.style.display = 'block';
    btn.textContent = 'Redirecting…';
    setTimeout(() => window.location.href = 'admin.html', 800);
  }
}
</script>
</body>
</html>
