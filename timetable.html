<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timetable — KCMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0a1628; --navy-mid: #112240; --navy-light: #1a2f4a;
    --gold: #c9a84c; --gold-light: #e8c97a;
    --cream: #f5f0e8; --white: #fff; --gray: #8892a4;
    --border: rgba(201,168,76,0.2); --red: #e05c5c;
    --green: #5cce8a; --blue: #5ca8e0;
    --purple: #9b7fe0; --orange: #e09b5c;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--cream); }

  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: rgba(10,22,40,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 900; color: var(--gold); text-decoration: none; }
  .nav-logo span { color: var(--cream); }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a { color: var(--gray); font-size: 0.85rem; font-weight: 500; text-decoration: none; letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }

  .page-header {
    padding: 3.5rem 4rem 2.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--navy-mid);
  }
  .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 900; color: var(--cream); }
  .page-header p { color: var(--gray); margin-top: 0.5rem; font-size: 0.95rem; }

  /* FILTERS */
  .filters-bar {
    display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;
    padding: 2rem 4rem;
    background: var(--navy-mid);
    border-bottom: 1px solid var(--border);
  }
  .filter-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .filter-group label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray); }
  .filter-group select, .filter-group input {
    background: var(--navy); border: 1px solid var(--border);
    color: var(--cream); padding: 0.55rem 1rem;
    border-radius: 4px; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; min-width: 180px; cursor: pointer;
    transition: border-color 0.2s;
  }
  .filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--gold); }
  .btn-filter {
    background: var(--gold); color: var(--navy);
    border: none; padding: 0.6rem 1.6rem;
    border-radius: 4px; font-weight: 600; font-size: 0.88rem;
    cursor: pointer; transition: all 0.2s; align-self: flex-end;
  }
  .btn-filter:hover { background: var(--gold-light); }
  .btn-reset {
    background: transparent; color: var(--gray);
    border: 1px solid var(--border); padding: 0.6rem 1.2rem;
    border-radius: 4px; font-size: 0.88rem; cursor: pointer;
    transition: all 0.2s; align-self: flex-end;
  }
  .btn-reset:hover { color: var(--cream); border-color: var(--cream); }

  /* VIEW TOGGLE */
  .view-toggle {
    margin-left: auto; display: flex; gap: 0.5rem; align-self: flex-end;
  }
  .toggle-btn {
    background: var(--navy); border: 1px solid var(--border);
    color: var(--gray); padding: 0.55rem 1rem;
    border-radius: 4px; font-size: 0.85rem; cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn.active { background: var(--navy-light); color: var(--gold); border-color: var(--gold); }

  /* MAIN */
  .main-content { padding: 2.5rem 4rem; }

  /* GRID VIEW */
  .timetable-grid {
    width: 100%; overflow-x: auto;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--navy-mid);
  }
  .timetable-grid table { width: 100%; border-collapse: collapse; min-width: 900px; }
  .timetable-grid th {
    background: rgba(201,168,76,0.1);
    padding: 1rem 1.2rem;
    font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--gold); text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .timetable-grid td {
    padding: 1rem 1.2rem;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    font-size: 0.9rem; color: var(--cream);
    vertical-align: middle;
  }
  .timetable-grid tr:last-child td { border-bottom: none; }
  .timetable-grid tr:hover td { background: rgba(201,168,76,0.04); }

  .badge {
    display: inline-block; padding: 0.22rem 0.7rem;
    border-radius: 20px; font-size: 0.75rem; font-weight: 600;
  }
  .badge-course { background: rgba(201,168,76,0.15); color: var(--gold); }
  .badge-sem { background: rgba(92,168,224,0.15); color: var(--blue); }
  .badge-day { background: rgba(155,127,224,0.15); color: var(--purple); }

  /* WEEKLY GRID VIEW */
  .week-grid { display: none; }
  .week-grid.active { display: block; }
  .list-view { display: block; }
  .list-view.hidden { display: none; }

  .week-wrapper { overflow-x: auto; }
  .week-table { width: 100%; border-collapse: collapse; min-width: 900px; background: var(--navy-mid); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .week-table th {
    background: rgba(201,168,76,0.1); padding: 0.9rem 0.6rem;
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--gold); text-align: center; border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .week-table .time-col { color: var(--gray); font-size: 0.78rem; text-align: center; white-space: nowrap; }
  .week-table td {
    border-right: 1px solid rgba(201,168,76,0.08);
    border-bottom: 1px solid rgba(201,168,76,0.08);
    padding: 0.4rem; vertical-align: top; min-width: 120px; height: 80px;
  }
  .week-table td:last-child, .week-table th:last-child { border-right: none; }
  .slot-card {
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px; padding: 0.4rem 0.5rem;
    font-size: 0.72rem; color: var(--cream); cursor: pointer;
    height: 100%;
  }
  .slot-card .slot-subject { font-weight: 600; margin-bottom: 0.15rem; }
  .slot-card .slot-meta { color: var(--gray); font-size: 0.65rem; }

  /* EMPTY / LOADING */
  .empty-state {
    text-align: center; padding: 5rem 2rem;
    color: var(--gray);
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--cream); margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.9rem; }
  .loading { display: flex; justify-content: center; padding: 3rem; gap: 0.5rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-10px)} }

  .summary-bar {
    display: flex; gap: 2rem; padding: 1rem 4rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem; color: var(--gray);
    background: rgba(17,34,64,0.5);
  }
  .summary-bar strong { color: var(--cream); }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .page-header { padding: 2.5rem 1.5rem 2rem; }
    .filters-bar { padding: 1.5rem; flex-direction: column; }
    .filter-group select, .filter-group input { min-width: 100%; }
    .main-content { padding: 1.5rem; }
    .view-toggle { margin-left: 0; }
    .summary-bar { padding: 1rem 1.5rem; flex-wrap: wrap; gap: 1rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">KCMS <span>·</span></a>
  <div class="nav-links">
    <a href="timetable.html" class="active">Timetable</a>
    <a href="faculty.html">Faculty</a>
  </div>
</nav>

<div class="page-header">
  <h1>Class Timetable</h1>
  <p>View schedules for all courses and semesters. Use the filters below to find your classes.</p>
</div>

<div class="filters-bar">
  <div class="filter-group">
    <label>Course</label>
    <select id="filterCourse">
      <option value="">All Courses</option>
      <option value="MBA">MBA</option>
      <option value="PGDM">PGDM</option>
      <option value="BBA">BBA</option>
      <option value="BTTM">BTTM</option>
      <option value="MTMT">MTMT</option>
      <option value="BCA">BCA</option>
      <option value="BCOM">B.Com</option>
      <option value="MCOM">M.Com</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Semester</label>
    <select id="filterSem">
      <option value="">All Semesters</option>
      <option value="1">Semester 1</option>
      <option value="2">Semester 2</option>
      <option value="3">Semester 3</option>
      <option value="4">Semester 4</option>
      <option value="5">Semester 5</option>
      <option value="6">Semester 6</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Day</label>
    <select id="filterDay">
      <option value="">All Days</option>
      <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
      <option>Thursday</option><option>Friday</option><option>Saturday</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Section</label>
    <select id="filterSection">
      <option value="">Toutes les sections</option>
      <option value="A">Section A</option>
      <option value="B">Section B</option>
      <option value="C">Section C</option>
      <option value="D">Section D</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Search Subject / Faculty</label>
    <input type="text" id="filterSearch" placeholder="e.g. Marketing, Dr. Singh…">
  </div>
  <button class="btn-filter" onclick="applyFilters()">Apply</button>
  <button class="btn-reset" onclick="resetFilters()">Reset</button>
  <div class="view-toggle">
    <button class="toggle-btn active" id="btnList" onclick="setView('list')">☰ List</button>
    <button class="toggle-btn" id="btnWeek" onclick="setView('week')">⊞ Week</button>
  </div>
</div>

<div class="summary-bar" id="summaryBar">
  <span>Showing <strong id="countLabel">—</strong> entries</span>
</div>

<div class="main-content">
  <!-- LIST VIEW -->
  <div class="list-view" id="listView">
    <div class="timetable-grid">
      <table>
        <thead>
          <tr>
            <th>Course</th>
            <th>Semester</th>
            <th>Section</th>
            <th>Day</th>
            <th>Time</th>
            <th>Subject</th>
            <th>Faculty</th>
            <th>Room</th>
          </tr>
        </thead>
        <tbody id="timetableBody">
          <tr><td colspan="8"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- WEEK VIEW -->
  <div class="week-grid" id="weekView">
    <div class="week-wrapper">
      <table class="week-table">
        <thead>
          <tr>
            <th class="time-col">Time</th>
            <th>Monday</th><th>Tuesday</th><th>Wednesday</th>
            <th>Thursday</th><th>Friday</th><th>Saturday</th>
          </tr>
        </thead>
        <tbody id="weekBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- SUPABASE CONFIG -->
<script>
// =============================================
// 🔧 REPLACE WITH YOUR SUPABASE CREDENTIALS
// =============================================
const SUPABASE_URL = 'https://uotxrxixyyqgzyjnasgx.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_fDdMxOswlp94txp5TssRlA_Oas-_d2H';
// =============================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let allData = [];
let currentView = 'list';

// Read URL params for pre-filters (from index.html course cards)
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('course')) document.getElementById('filterCourse').value = urlParams.get('course');

async function loadTimetable() {
  try {
    const { data, error } = await sb.from('timetable').select(`
      id, course, semester, section, day, start_time, end_time, subject, room,
      faculty:faculty_id (name)
    `).order('day').order('start_time');

    if (error) throw error;
    allData = data || [];
    applyFilters();
  } catch (err) {
    console.error(err);
    // DEMO DATA — remove when Supabase is configured
    allData = getDemoData();
    applyFilters();
  }
}

function getDemoData() {
  return [];
}

function applyFilters() {
  const course = document.getElementById('filterCourse').value;
  const sem = document.getElementById('filterSem').value;
  const day = document.getElementById('filterDay').value;
  const section = document.getElementById('filterSection').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();

  let filtered = allData.filter(r => {
    if (course && r.course !== course) return false;
    if (sem && String(r.semester) !== sem) return false;
    if (day && r.day !== day) return false;
    if (section && r.section !== section) return false;
    if (search) {
      const haystack = `${r.subject} ${r.faculty?.name || ''}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('countLabel').textContent = filtered.length;
  renderList(filtered);
  if (currentView === 'week') renderWeek(filtered);
}

function resetFilters() {
  document.getElementById('filterCourse').value = '';
  document.getElementById('filterSem').value = '';
  document.getElementById('filterDay').value = '';
  document.getElementById('filterSection').value = '';
  document.getElementById('filterSearch').value = '';
  applyFilters();
}

function renderList(data) {
  const tbody = document.getElementById('timetableBody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📭</div><h3>No classes found</h3><p>Try changing your filters.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(r => `
    <tr>
      <td><span class="badge badge-course">${r.course}</span></td>
      <td><span class="badge badge-sem">Sem ${r.semester}</span></td>
      <td>${r.section ? `<span class="badge" style="background:rgba(92,206,138,0.15);color:#7debb8">§ ${r.section}</span>` : '<span style="color:#8892a4;font-size:0.75rem">—</span>'}</td>
      <td><span class="badge badge-day">${r.day}</span></td>
      <td>${r.start_time}${r.end_time ? ' – ' + r.end_time : ''}</td>
      <td><strong>${r.subject}</strong></td>
      <td>${r.faculty?.name || '—'}</td>
      <td>${r.room || '—'}</td>
    </tr>
  `).join('');
}

function renderWeek(data) {
  const tbody = document.getElementById('weekBody');

  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--gray)">Aucun cours à afficher.</td></tr>`;
    return;
  }

  // Fixed breaks — always shown, never editable
  const BREAKS = [
    { time: '11:00', label: 'SHORT BREAK', sub: '11:00 – 11:15', color: 'rgba(224,155,92,0.18)', border: 'rgba(224,155,92,0.5)', text: '#e09b5c' },
    { time: '13:00', label: 'LUNCH BREAK', sub: '13:00 – 13:30', color: 'rgba(92,206,138,0.12)', border: 'rgba(92,206,138,0.4)', text: '#5cce8a' },
  ];
  const breakTimes = BREAKS.map(b => b.time);

  // Extract all unique start times from actual data, sorted chronologically
  const toMin = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
  const uniqueTimes = [...new Set(data.map(r => r.start_time))]
    .filter(t => !breakTimes.includes(t)) // exclude if a class accidentally starts at break time
    .sort((a, b) => toMin(a) - toMin(b));

  // Merge class times and break times, sorted
  const allTimes = [...uniqueTimes, ...breakTimes].sort((a, b) => toMin(a) - toMin(b));

  const rows = allTimes.map(time => {
    const breakDef = BREAKS.find(b => b.time === time);

    if (breakDef) {
      // Render a full-width break row spanning all day columns
      return `
        <tr>
          <td class="time-col" style="color:${breakDef.text};font-weight:700;">${breakDef.time}</td>
          ${DAYS.map(() => `
            <td style="background:${breakDef.color};border-right:1px solid rgba(201,168,76,0.08);">
              <div style="
                display:flex;align-items:center;justify-content:center;
                height:100%;min-height:48px;
                border:1px dashed ${breakDef.border};
                border-radius:4px;padding:0.3rem;
                font-size:0.72rem;font-weight:700;
                letter-spacing:0.08em;text-transform:uppercase;
                color:${breakDef.text};text-align:center;
              ">
                ${breakDef.label}<br>
                <span style="font-weight:400;font-size:0.65rem;opacity:0.8">${breakDef.sub}</span>
              </div>
            </td>
          `).join('')}
        </tr>`;
    }

    // Regular class row
    const cells = DAYS.map(day => {
      const slots = data.filter(r => r.day === day && r.start_time === time);
      const content = slots.map(s => `
        <div class="slot-card">
          <div class="slot-subject">${s.subject}</div>
          <div class="slot-meta">${s.course}${s.section ? ' §' + s.section : ''} S${s.semester} · ${s.faculty?.name || ''}</div>
          <div class="slot-meta">${s.end_time ? s.start_time + '–' + s.end_time : s.start_time}${s.room ? ' · ' + s.room : ''}</div>
        </div>
      `).join('');
      return `<td>${content}</td>`;
    }).join('');
    return `<tr><td class="time-col">${time}</td>${cells}</tr>`;
  }).join('');

  tbody.innerHTML = rows;
}

function setView(v) {
  currentView = v;
  document.getElementById('listView').classList.toggle('hidden', v !== 'list');
  document.getElementById('weekView').classList.toggle('active', v === 'week');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  document.getElementById('btnWeek').classList.toggle('active', v === 'week');
  if (v === 'week') applyFilters();
}

loadTimetable();
</script>
</body>
</html>
